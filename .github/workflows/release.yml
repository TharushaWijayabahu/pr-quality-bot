name: Release

on:
  push:
    tags: ['v[0-9]*.[0-9]*.[0-9]*']
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create (for example v1.2.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run all
      - name: Verify packaged action is current
        run: git diff --exit-code -- dist/index.js dist/sourcemap-register.js
      - name: Validate release version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use vMAJOR.MINOR.PATCH format" >&2
            exit 1
          fi
          test "$RELEASE_TAG" = "v$(node -p "require('./package.json').version")"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: gh release create "$RELEASE_TAG" --generate-notes --target "$GITHUB_SHA"
      - name: Update major-version tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          MAJOR_TAG="${RELEASE_TAG%%.*}"
          git tag --force "$MAJOR_TAG" "$GITHUB_SHA"
          git push origin "$MAJOR_TAG" --force
