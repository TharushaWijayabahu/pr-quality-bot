name: Bug report
description: Report a reproducible problem with PR Quality Bot
title: 'fix: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: input
    id: version
    attributes:
      label: Action version
      placeholder: v1.0.0
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow and configuration
      description: Remove tokens and other secrets before pasting YAML.
      render: yaml
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Actual behavior and logs
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
